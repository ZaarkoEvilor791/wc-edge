name: Engine refresh

on:
  schedule:
    # 04:00 UTC — full run: apif ingest + model + optimizer
    - cron: '0 4 * * *'
    # 18:00 UTC — model + optimizer only (no apif, budget already used)
    - cron: '0 18 * * *'
    # Post-group bonus run: June 27 at 06:00 UTC (after group stage ends)
    - cron: '0 6 27 6 *'
  workflow_dispatch:
    inputs:
      skip_apif:
        description: 'Skip apif ingest (model+optimizer only)'
        required: false
        default: 'false'

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: apif ingest (04:00 and post-group runs only)
        if: |
          github.event.schedule == '0 4 * * *' ||
          github.event.schedule == '0 6 27 6 *' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_apif == 'false')
        run: python -m engine.wc_ingest --source apif --day 2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

      - name: Model + optimizer
        run: python -m engine.wc_run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
